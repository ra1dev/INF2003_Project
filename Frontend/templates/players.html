{% extends "base.html" %}

{% block content %}

<h1>Players</h1>
<p>{{ players|length }} players found</p>
<form method="GET" class="filter-box">

    <input type="text"
           name="search"
           placeholder="Search player"
           value="{{ search or '' }}">

    <select name="team">

        <option value="">All Teams</option>

        {% for team in teams %}
        <option value="{{ team.team_name }}"
            {% if selected_team == team.team_name %}selected{% endif %}>
            {{ team.team_name }}
        </option>
        {% endfor %}

    </select>

    <button type="submit">Search</button>

    <a href="/players" class="reset-btn">
        Reset
    </a>

</form>

<table class="players-table">
    <thead>
        <tr>
            <th>Player ID</th>
            <th>Player Name</th>
            <th>Team</th>
        </tr>
    </thead>

    <tbody>

        {% for player in players %}

    <tr class="clickable-row"
        data-href="{{ url_for('player_detail', player_id=player.player_id) }}">

        <td>{{ player.player_id }}</td>

        <td>{{ player.player_name }}</td>

        <td>
            <div class="match-team-cell">
                <img src="{{ player.team_logo }}" class="mini-logo">
                <span>{{ player.team_name }}</span>
            </div>
        </td>

    </tr>

{% endfor %}
    </tbody>

</table>
<script>
    document.querySelectorAll(".clickable-row").forEach(row => {
        row.addEventListener("click", () => {
            window.location.href = row.dataset.href;
        });
    });
</script>
{% endblock %}
